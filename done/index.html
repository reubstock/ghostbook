<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Done. Daily · Ghostbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --candle-warm: #ffd9a0;
    --candle: #ffb060;
    --ink: #f4e3c4;
    --ink-dim: rgba(244, 227, 196, 0.55);
    --ink-faint: rgba(244, 227, 196, 0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
    font-weight: 300;
    min-height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  html, body, * { cursor: none; }
  @media (hover: none), (pointer: coarse) {
    html, body, * { cursor: auto !important; }
  }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    background: radial-gradient(ellipse at center, rgba(255, 176, 96, 0.05) 0%, transparent 60%), var(--bg);
  }

  #cursor-ghost {
    position: fixed;
    width: 22px;
    height: 26px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    left: -100px;
    top: -100px;
    z-index: 200;
    filter: drop-shadow(0 0 8px rgba(255, 200, 130, 0.55));
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #cursor-ghost.lit { opacity: 1; }
  #cursor-ghost svg { display: block; width: 100%; height: 100%; }
  @media (hover: none), (pointer: coarse) {
    #cursor-ghost { display: none; }
  }

  .corner {
    position: fixed;
    font-size: 0.78rem;
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    z-index: 8;
    user-select: none;
    text-decoration: none;
    transition: color 0.5s;
  }
  .corner.top-left { top: 1.4rem; left: 1.6rem; }
  a.corner:hover { color: var(--candle-warm); }
  a.corner.back::before { content: "← "; opacity: 0.5; }

  #inner {
    max-width: 36rem;
    display: flex;
    flex-direction: column;
    gap: 2.6rem;
  }

  .title {
    font-style: italic;
    font-weight: 400;
    font-size: clamp(2.4rem, 5.6vw, 3.8rem);
    letter-spacing: 0.04em;
    color: var(--candle-warm);
    opacity: 0;
    animation: rise 1.8s ease-out 0.4s forwards;
  }

  .body {
    font-size: clamp(1.15rem, 2.4vw, 1.45rem);
    line-height: 1.55;
    color: var(--ink);
    letter-spacing: 0.015em;
    opacity: 0;
    animation: rise 1.8s ease-out 1.4s forwards;
  }

  .soon {
    font-style: italic;
    font-size: 1rem;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: rise 1.8s ease-out 2.4s forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .corner { font-size: 0.7rem; }
  }
</style>
</head>
<body>

<div id="cursor-ghost" aria-hidden="true">
  <svg viewBox="0 0 24 28" xmlns="http://www.w3.org/2000/svg">
    <path d="M 12 1 C 5 1 3 5 3 12 L 3 22 Q 5.25 26 7.5 22 Q 9.75 26 12 22 Q 14.25 26 16.5 22 Q 18.75 26 21 22 L 21 12 C 21 5 19 1 12 1 Z" fill="rgba(255, 220, 170, 0.92)"/>
    <ellipse cx="9" cy="12" rx="1.2" ry="1.6" fill="rgba(30, 15, 0, 0.75)"/>
    <ellipse cx="15" cy="12" rx="1.2" ry="1.6" fill="rgba(30, 15, 0, 0.75)"/>
  </svg>
</div>

<a class="corner top-left back" href="/">Ghostbook</a>

<div id="inner">
  <div class="title">Done. Daily</div>
  <div class="body">
    While your want sits in the vault,<br>
    you train for the person who can have it.<br><br>
    One small act, every day, for a year.<br>
    We'll suggest. You can propose your own.<br>
    A hundred pushups. A particular book.<br>
    The walk you keep skipping.
  </div>
  <div class="soon">opening soon</div>
</div>

<script>
  const cursorGhost = document.getElementById('cursor-ghost');
  window.addEventListener('mousemove', (e) => {
    cursorGhost.style.left = e.clientX + 'px';
    cursorGhost.style.top = e.clientY + 'px';
    if (!cursorGhost.classList.contains('lit')) cursorGhost.classList.add('lit');
  });
</script>
</body>
</html>
